<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>德语A2通关大挑战</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        body {
            background-color: #F8FAFC;
            font-family: 'Noto Sans SC', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
        }

        /* 优化后的硬件加速动效：杜绝卡顿 */
        @keyframes rocket-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .rocket-box {
            font-size: 3.5rem;
            display: inline-block;
            will-change: transform; /* 强制启用硬件加速 */
            animation: rocket-float 2.5s ease-in-out infinite;
            margin-bottom: 1.5rem;
        }

        /* 标题美化：更厚重的大厂视觉 */
        .main-title {
            color: #1E293B;
            font-weight: 900;
            letter-spacing: -0.02em;
            font-size: 1.75rem;
        }

        #code-input {
            color: #1E293B !important;
            font-weight: 900 !important;
            letter-spacing: 2px;
            caret-color: #6366F1; /* 光标颜色 */
        }

        .btn-gradient {
            background: linear-gradient(135deg, #4338CA 0%, #1E1B4B 100%);
            box-shadow: 0 10px 25px -5px rgba(67, 56, 202, 0.3);
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #E2E8F0, transparent);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="glass-card w-full max-w-[400px] rounded-[3rem] p-12 text-center relative">
        <header class="mb-10">
            <div class="rocket-box">🚀</div>
            <h1 class="main-title">德语 A2 通关大挑战</h1>
        </header>

        <div class="space-y-6">
            <input type="text" id="code-input" placeholder="激活码" 
                   class="w-full bg-slate-50 border-2 border-slate-100 rounded-[1.25rem] p-5 focus:bg-white focus:border-indigo-500 outline-none transition-all text-center">
            
            <button onclick="verify()" 
                    class="w-full btn-gradient text-white font-black py-5 rounded-[1.25rem] active:scale-[0.96] transition-all duration-200 text-lg">
                立即开启
            </button>
        </div>
    </div>

    <footer class="mt-12 w-full max-w-[400px] text-center">
        <div class="divider mb-6"></div>
        <div class="text-slate-400 text-[11px] font-bold tracking-widest">
            © 2026 GEHTALLES 刘老师工作室 | 正版授权
        </div>
    </footer>

    <script>
        const ACCESS_KEY = 'map_access_a2';
        const VALID_TOKEN = "Servus2026";

        // 自动登录检测
        if (localStorage.getItem(ACCESS_KEY) === VALID_TOKEN) {
            window.location.href = "main.html";
        }

        function verify() {
            const input = document.getElementById('code-input').value.trim();
            if (input === VALID_TOKEN) {
                localStorage.setItem(ACCESS_KEY, VALID_TOKEN);
                window.location.href = "main.html";
            } else if (input === "") {
                alert("请输入激活码哦！");
            } else {
                alert("激活码错误，请重新输入。");
            }
        }

        document.getElementById('code-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verify();
        });
    </script>
</body>
</html>
