<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>激活 A2 挑战营 | gehtalles 德语</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        body {
            background: linear-gradient(180deg, #0F172A 0%, #1E1B4B 100%);
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 48px;
            width: 90%;
            max-width: 400px;
            padding: 3.5rem 2rem;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
        }

        /* 极致丝滑的呼吸动画 */
        @keyframes rocket-ultra-smooth {
            0% { 
                transform: scale(1) translateY(0); 
                filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.3)); 
            }
            50% { 
                transform: scale(1.08) translateY(-10px); 
                filter: drop-shadow(0 0 30px rgba(99, 102, 241, 0.6)); 
            }
            100% { 
                transform: scale(1) translateY(0); 
                filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.3)); 
            }
        }

        .rocket-icon {
            font-size: 3.8rem;
            display: inline-block;
            animation: rocket-ultra-smooth 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            will-change: transform, filter;
            margin-bottom: 2rem;
        }

        /* 核心修改：输入框垂直水平绝对居中 */
        input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-appearance: none;
            line-height: normal; /* 修正默认行高 */
            text-align: center;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            font-weight: 500;
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: #6366F1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .btn-activate {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            transition: all 0.3s ease;
        }

        /* 老师要求的大厂风 + 英语版权保护 */
        .footer-copyright {
            margin-top: 3.5rem;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 500;
            letter-spacing: 0.1em;
            line-height: 1.8;
        }
        
        .footer-copyright span {
            display: block;
            opacity: 0.6;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="rocket-icon">🚀</div>

        <h1 class="text-3xl font-black text-white mb-10 tracking-tight">德语 A2 进阶挑战</h1>

        <div class="space-y-6">
            <input type="text" id="accessCode" 
                   placeholder="激活码" 
                   class="w-full h-16 px-6 rounded-3xl font-bold text-xl tracking-widest">
            
            <button onclick="verifyAccess()" 
                    class="btn-activate w-full py-5 rounded-3xl text-white font-black text-lg tracking-[0.2em]">
                立即开启挑战
            </button>
        </div>

        <p class="footer-copyright">
            © GEHTALLES 刘老师德语工作室
            <span>Copyright All Rights Reserved</span>
        </p>
    </div>

    <script>
        function verifyAccess() {
            const code = document.getElementById('accessCode').value.trim();
            
            if (code === "Servus2026") {
                localStorage.setItem('map_access_a2', 'Servus2026');
                
                const btn = document.querySelector('.btn-activate');
                btn.innerHTML = "验证成功";
                btn.style.background = "#059669";
                
                setTimeout(() => {
                    window.location.href = "main.html";
                }, 800);
            } else {
                alert("验证码不正确，请重新输入 ✍️");
                document.getElementById('accessCode').value = "";
            }
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyAccess();
        });
    </script>

</body>
</html>
