<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>激活 A2 挑战营 | gehtalles 德语</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        body {
            background: linear-gradient(180deg, #1E1B4B 0%, #312E81 100%);
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
        }

        input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            border-color: #818CF8;
        }

        .btn-activate {
            background: linear-gradient(90deg, #6366F1 0%, #8B5CF6 100%);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body>

    <div class="login-card p-8 text-center shadow-2xl">
        <div class="w-20 h-20 bg-indigo-500/20 rounded-3xl mx-auto mb-6 flex items-center justify-center">
            <span class="text-4xl">🚀</span>
        </div>

        <h1 class="text-2xl font-black text-white mb-2">德语 A2 进阶挑战</h1>
        <p class="text-indigo-200/60 text-sm mb-8 font-bold tracking-widest uppercase">Level A2 Access</p>

        <div class="space-y-4">
            <input type="text" id="accessCode" 
                   placeholder="请输入 A2 地图激活暗号" 
                   class="w-full px-6 py-4 rounded-2xl text-center font-bold placeholder-indigo-300/40">
            
            <button onclick="verifyAccess()" 
                    class="btn-activate w-full py-4 rounded-2xl text-white font-black tracking-widest transition-transform active:scale-95">
                立即开启挑战
            </button>
        </div>

        <p class="mt-8 text-[10px] text-indigo-300/40 font-bold uppercase tracking-widest">
            © gehtalles 刘老师德语工作室
        </p>
    </div>

    <script>
        function verifyAccess() {
            const code = document.getElementById('accessCode').value.trim();
            
            // 这里设置 A2 的专属暗号
            if (code === "Servus2026") {
                // 写入 A2 专属权限标识
                localStorage.setItem('map_access_a2', 'Servus2026');
                
                // 成功反馈
                document.querySelector('.btn-activate').innerHTML = "验证成功！进入中...";
                
                setTimeout(() => {
                    window.location.href = "main.html";
                }, 800);
            } else {
                alert("暗号不对哦，请检查发货清单或联系刘老师。");
                document.getElementById('accessCode').value = "";
            }
        }

        // 支持回车提交
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verifyAccess();
        });
    </script>

</body>
</html>
