<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证身份</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 这里的文字加粗加深，更显眼 */
        #code-input {
            color: #1E293B !important; 
            font-weight: 900 !important;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
        <h2 class="text-2xl font-black text-slate-800 mb-2">请输入激活码</h2>
        <p class="text-slate-400 text-sm mb-6">输入 A2 专属暗号开启挑战</p>
        
        <input type="text" id="code-input" placeholder="在此输入..." 
               class="w-full border-2 border-slate-200 rounded-2xl p-4 mb-4 focus:border-indigo-500 outline-none transition-all">
        
        <button onclick="verify()" 
                class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
            立即进入
        </button>
    </div>

    <script>
        function verify() {
            const code = document.getElementById('code-input').value;
            if (code === "Servus2026") {
                // 【关键步骤】在本地存入通行证
                localStorage.setItem('map_access_a2', 'Servus2026');
                // 跳转到地图
                window.location.href = "main.html";
            } else {
                alert("暗号不对哦，请检查大小写！");
            }
        }

        // 如果之前已经验证过，直接送去地图，不用再看登录框
        if (localStorage.getItem('map_access_a2') === "Servus2026") {
            window.location.href = "main.html";
        }
    </script>
</body>
</html>
