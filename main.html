<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>德语 A2 全能通关挑战营</title>
    
    <script>
        if (localStorage.getItem('map_access_a2') !== "Servus2026") {
            window.location.href = "index.html";
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        body { background-color: #FDFCFB; font-family: 'Noto Sans SC', sans-serif; color: #1E293B; overflow-x: hidden; }

        /* 优化后的全平台不折行水印 */
        #watermark-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* 确保缩放时不产生滚动条 */
            opacity: 0.1; /* 稍微调浅一点，更有高级感 */
        }

        .wm-text {
            font-size: 28px; /* 基础字号 */
            font-weight: 900;
            color: #000;
            transform: rotate(-25deg);
            text-align: center;
            white-space: nowrap; /* 【核心】强制文字不换行 */
            user-select: none;
            letter-spacing: 4px;
        }

        /* 针对手机端的自适应缩放，确保不溢出也不折行 */
        @media (max-width: 480px) {
            .wm-text {
                transform: rotate(-25deg) scale(0.7); /* 手机端自动缩小到 70% */
            }
        }

        .a2-card {
            background: #FFFFFF; border: 1px solid #E5E7EB; border-bottom: 4px solid #D4D4D8; 
            border-radius: 20px; transition: all 0.2s ease; cursor: pointer;
        }
        .a2-card:active { transform: scale(0.96); border-bottom-width: 1px; }
    </style>
</head>
<body class="py-10 px-4">
    <div id="watermark-layer">
        <div class="wm-text">正版授权：GEHTALLES 刘老师德语</div>
    </div>

    <div class="app-container max-w-[480px] mx-auto relative z-10">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black mb-2 text-indigo-900">德语 A2 通关大挑战</h1>
            <p class="text-[10px] text-slate-400 font-bold tracking-[0.2em] uppercase">Level A2 • 语法与实战进阶</p>
            <div class="w-16 h-1 bg-indigo-600 rounded-full mx-auto mt-4"></div>
        </header>

        <main class="grid grid-cols-2 gap-4">
            <div onclick="go('01-Praeteritum')" class="a2-card p-5 flex flex-col items-center text-center">
                <div class="w-12 h-12 bg-[#6366F1] rounded-2xl flex items-center justify-center text-white font-black text-xl mb-3 shadow-lg">1</div>
                <h3 class="text-sm font-black text-slate-800">过去时先锋营</h3>
                <p class="text-[9px] text-slate-400 mt-1 uppercase font-bold tracking-tighter">Präteritum</p>
            </div>
            
            <div class="a2-card p-5 flex flex-col items-center text-center opacity-50">
                <div class="w-12 h-12 bg-slate-200 rounded-2xl flex items-center justify-center text-slate-400 font-black text-xl mb-3">2</div>
                <h3 class="text-sm font-black text-slate-400">敬请期待</h3>
                <p class="text-[9px] text-slate-300 mt-1 uppercase font-bold">Coming Soon</p>
            </div>
        </main>

        <footer class="mt-12 text-center pb-10">
            <div class="inline-block px-5 py-1 border border-slate-200 rounded-full text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                GEHTALLES 工作室 | 德语 A2
            </div>
        </footer>
    </div>

    <script>
        function go(name) { window.location.href = name + ".html"; }
        document.oncontextmenu = () => false;
    </script>
</body>
</html>
