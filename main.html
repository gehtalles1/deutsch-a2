<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>德语 A2 全能通关挑战营</title>
    
    <script>
        // 地图页的保镖：如果没有通行证，踢回登录页
        if (localStorage.getItem('map_access_a2') !== "Servus2026") {
            window.location.href = "index.html";
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        body { background-color: #FDFCFB; font-family: 'Noto Sans SC', sans-serif; color: #1E293B; overflow-x: hidden; }

        /* 修复后的水印：增加安全边距，防止溢出 */
        #watermark-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px; /* 增加边距 */
            opacity: 0.12;
        }

        .wm-text {
            font-size: clamp(20px, 6vw, 30px); /* 字体大小随屏幕缩放 */
            font-weight: 900;
            color: #000;
            transform: rotate(-25deg);
            text-align: center;
            line-height: 1.5;
            word-break: break-all; /* 防止长文本溢出 */
            max-width: 90%; /* 限制宽度 */
        }

        .a2-card {
            background: #FFFFFF; border: 1px solid #E5E7EB; border-bottom: 4px solid #D4D4D8; 
            border-radius: 20px; transition: all 0.2s ease; cursor: pointer;
        }
        .a2-card:active { transform: scale(0.96); border-bottom-width: 1px; }
    </style>
</head>
<body class="py-10 px-4">
    <div id="watermark-layer">
        <div class="wm-text">正版授权：gehtalles刘老师德语</div>
    </div>

    <div class="app-container max-w-[480px] mx-auto relative z-10">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black mb-2 text-indigo-900">德语 A2 通关大挑战</h1>
            <p class="text-[10px] text-slate-400 font-bold tracking-[0.2em]">Level A2 • 语法与实战进阶</p>
            <div class="w-16 h-1 bg-indigo-600 rounded-full mx-auto mt-4"></div>
        </header>

        <main class="grid grid-cols-2 gap-4">
            <div onclick="go('01-Praeteritum')" class="a2-card p-5 flex flex-col items-center text-center">
                <div class="w-12 h-12 bg-[#6366F1] rounded-2xl flex items-center justify-center text-white font-black text-xl mb-3">1</div>
                <h3 class="text-sm font-black text-slate-800">过去时先锋营</h3>
                <p class="text-[9px] text-slate-400 mt-1 uppercase font-bold tracking-tighter">Präteritum</p>
            </div>
            </main>
    </div>

    <script>
        function go(name) { window.location.href = name + ".html"; }
        document.oncontextmenu = () => false;
    </script>
</body>
</html>
