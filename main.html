<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>刘老师德语课 - 扁平版地图</title>
    
    <script>
        // 登录权限检查保持不动
        if (localStorage.getItem('map_access_a2') !== "Servus2026") {
            window.location.href = "index.html";
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        body { background-color: #FDFCFB; font-family: 'Noto Sans SC', sans-serif; color: #1E293B; overflow-x: hidden; }

        /* 全平台不折行水印 */
        #watermark-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            opacity: 0.1; 
        }

        .wm-text {
            font-size: 28px; 
            font-weight: 900;
            color: #000;
            transform: rotate(-25deg);
            text-align: center;
            white-space: nowrap; 
            user-select: none;
            letter-spacing: 4px;
        }

        @media (max-width: 480px) { wm-text { transform: rotate(-25deg) scale(0.7); } }

        /* 卡片基础样式 - 增加扁平化立体感 */
        .a2-card {
            background: #FFFFFF; border: 2px solid #E2E8F0; border-bottom: 6px solid #CBD5E1; 
            border-radius: 20px; transition: all 0.1s ease; cursor: pointer;
            position: relative; overflow: hidden;
        }
        /* 点击时的压下效果 */
        .a2-card:active { transform: translateY(4px); border-bottom-width: 2px; }
        
    </style>
</head>
<body class="py-10 px-4">
    <div id="watermark-layer">
        <div class="wm-text">正版授权：GEHTALLES 刘老师德语</div>
    </div>

    <div class="app-container max-w-[480px] mx-auto relative z-10">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black mb-2 text-indigo-950">德语 A2 通关大挑战</h1>
            <p class="text-[10px] text-slate-400 font-bold tracking-[0.2em] uppercase">Level A2 • 语法与实战进阶</p>
            <div class="w-16 h-1 bg-indigo-600 rounded-full mx-auto mt-4"></div>
        </header>

        <main id="level-list" class="grid grid-cols-2 gap-x-5 gap-y-6">
            </main>

        <footer class="mt-16 text-center pb-10">
            <div class="inline-block px-5 py-1 border border-slate-200 rounded-full text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                GEHTALLES 工作室 | 德语 A2
            </div>
        </footer>
    </div>

<script>
    // 精选地道扁平化高饱和度扁平颜色，每关都不同，确保在白底上清晰
    const flatColors = [
        "#4F46E5", // 1 Indigo
        "#10B981", // 2 Emerald
        "#F59E0B", // 3 Amber
        "#EF4444", // 4 Red
        "#3B82F6", // 5 Blue
        "#8B5CF6", // 6 Violet
        "#EC4899", // 7 Pink
        "#14B8A6", // 8 Teal
        "#F97316", // 9 Orange
        "#84CC16", // 10 Lime
        "#22C55E", // 11 Green
        "#06B6D4", // 12 Cyan
        "#D946EF", // 13 Fuchsia
        "#A855F7", // 14 Purple
        "#64748B", // 15 Slate (实战)
        "#0F172A", // 16 Slate 900 (实战)
        "#475569", // 17 Slate 600
        "#1E293B", // 18 Slate 800
        "#94A3B8", // 19 Slate 400
        "#E2E8F0"  // 20 Slate 200 (未解锁占位)
    ];

    const levels = [
        { id: 1, title: "过去时先锋营", desc: "PRÄTERITUM", file: "01-Praeteritum" },
        { id: 2, title: "反身动词镜像馆", desc: "REFLEXIVE VERBEN", file: "02-Reflexive-Verben" },
        { id: 3, title: "情态动词进阶", desc: "MODALVERBEN", file: "03-modalverben" },
        { id: 4, title: "完成时高手进阶", desc: "PERFEKT PRO", file: "04-superperfekt" },
        { id: 5, title: "从句实验室", desc: "NEBENSÄTZE", file: "05-nebensatz" },
        { id: 6, title: "比较级最高级适配", desc: "KOMPERATIV & SUPERLATIV", file: "06-komsuper-adj" },
        { id: 7, title: "形容词词尾魔鬼", desc: "ADJEKTIVENDUNGEN", file: "07-adj-endung" },
        { id: 8, title: "地点介词全家桶", desc: "LOKALE PRÄPOSITIONEN", file: "08-Lokale-Präposition" },
        { id: 9, title: "代副词大作战", desc: "Da- / Wo-Komposita", file: "09-da-wo-compounds" },
        { id: 10, title: "不定代词训练营", desc: "INDEFINITPRONOMEN", file: "10-Indefinitpronomen" },
        { id: 11, title: "实战：医疗篇", desc: "MEDIZIN IM ALLTAG", file: "11-arzt" },
        { id: 12, title: "实战：职场篇", desc: "BERUFSALLTAG & JOB", file: "12-arbeit" },
        { id: 13, title: "实战：旅行酒店", desc: "REISE & HOTEL", file: "13-reise" }
    ];

    const container = document.getElementById('level-list');

    levels.forEach((level, index) => {
        const color = flatColors[index % flatColors.length];
        const card = document.createElement('div');
        card.className = 'a2-card p-5 flex flex-col items-center text-center';
        // 手动处理扁平化立体边框色
        card.style.borderColor = "#E2E8F0"; 
        card.style.borderBottomColor = "#CBD5E1"; 
        card.onclick = () => go(level.file);

        card.innerHTML = `
            <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white font-black text-2xl mb-4 shadow-none" 
                 style="background-color: ${color};">
                ${level.id}
            </div>
            <h3 class="text-[13px] font-black text-slate-900 leading-tight">${level.title}</h3>
            <p class="text-[8px] text-slate-400 mt-1.5 uppercase font-bold tracking-tighter">${level.desc}</p>
        `;
        container.appendChild(card);
    });

    // 禁用右键逻辑不变
    function go(name) { window.location.href = name + ".html"; }
    document.oncontextmenu = () => false;
</script>
</body>
</html>
